<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Editor - Professional Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_three@1.5/D2Coding.css">
    
    <!-- PPTX 생성 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js" crossorigin="anonymous"></script>
    
    <!-- Markdown 파서 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Syntax Highlighting 라이브러리 (highlight.js) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>

    <link rel="stylesheet" href="src/style.css">
</head>
<body>

    <!-- 커스텀 모달 UI -->
    <dialog id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <p id="modal-message">메시지</p>
            <div class="modal-buttons">
                <button type="button" id="modal-btn-confirm" class="btn-danger">확인</button>
                <button type="button" id="modal-btn-cancel" class="btn-secondary">취소</button>
            </div>
        </div>
    </dialog>

    <!-- 이미지 확대 모달 UI -->
    <dialog id="image-modal" class="img-modal-overlay" onclick="window.closeImageModal()">
        <img id="image-modal-content" class="img-modal-content" src="">
    </dialog>

    <!-- 맨 위로 가기 플로팅 버튼 -->
    <button type="button" class="btn-top" id="btn-top-editor" onclick="window.scrollToTop()">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <header class="app-shell-header">
        <nav class="header-nav" aria-label="주요 도구">
        <div class="logo-lockup">
            <a class="logo-link" href="https://github.com/parking-place/Slide-Editor" target="_blank" rel="noopener noreferrer" title="GitHub repository">
                <div class="logo">Slide <span>Editor</span></div>
            </a>
            <span id="app-version" class="app-version" hidden></span>
        </div>
        <div class="header-actions">
            <span id="project-indicator" class="project-indicator">Project loading...</span>

            <button type="button" class="btn-hdr btn-hdr--amber" title="Theme" onclick="window.openThemeModal()">
                <i class="fa-solid fa-palette"></i> Theme
            </button>
            <button type="button" class="btn-hdr btn-hdr--indigo" title="Branding" onclick="window.openBrandingModal()">
                <i class="fa-solid fa-tag"></i> Branding
            </button>
            <div class="hdr-divider"></div>

            <button type="button" class="btn-hdr btn-hdr--purple" title="Project manager" onclick="window.openProjectModal('open')">
                <i class="fa-solid fa-folder-tree"></i> Project
            </button>
            <div class="hdr-divider"></div>

            <input type="file" id="import-data-input" accept=".json" style="display: none;" onchange="window.importData(event)">
            <button type="button" class="btn-hdr btn-hdr--purple" title="Import JSON" onclick="document.getElementById('import-data-input').click()">
                <i class="fa-solid fa-file-import"></i> Import
            </button>
            <button type="button" class="btn-hdr btn-hdr--blue" title="Download JSON backup" onclick="window.downloadData()">
                <i class="fa-solid fa-download"></i> Backup
            </button>
            <button type="button" class="btn-hdr btn-hdr--blue-solid" id="dl-save-btn" title="Save current project" onclick="window.exportData()">
                <i class="fa-solid fa-floppy-disk"></i> Save
            </button>
            <div class="hdr-divider"></div>

            <button type="button" class="btn-hdr" id="dl-html-view-btn" title="Preview web guide" onclick="window.viewWebGuide()">
                <i class="fa-solid fa-book-open"></i> Guide
            </button>
            <button type="button" class="btn-hdr" id="dl-html-btn" title="Download guide HTML" onclick="window.exportToHTML()">
                <i class="fa-solid fa-file-code"></i> HTML
            </button>
            <button type="button" class="btn-hdr btn-hdr--green" id="dl-btn" title="Download PPTX" onclick="window.exportToPPTX()">
                <i class="fa-solid fa-file-export"></i> PPTX
            </button>
        </div>
        </nav>
    </header>

    <main class="layout-wrapper" id="editor-main">
        <!-- 동적 목차 사이드바 -->
        <aside class="toc-sidebar" id="toc-navigator" aria-label="슬라이드 탐색">
            <!-- 자바스크립트로 목차가 렌더링 됩니다 -->
        </aside>

        <section class="main-container" aria-label="슬라이드 편집 영역">
            
            <div class="status-bar" id="status-text">시작하려면 아래 폼을 작성하고 생성 버튼을 눌러주세요.</div>
            
            <!-- 프리뷰 렌더링 영역 -->
            <section id="preview-area" aria-label="슬라이드 미리보기" style="display: flex; flex-direction: column; gap: 30px;">
            </section>

        </section>
    </main>

    <script src="src/app.js"></script>
    <script src="src/features/media.js"></script>
    <script src="src/features/semantics.js"></script>
    <script src="src/features/export.js"></script>
    <script src="src/features/forms.js"></script>
    <script src="src/features/outline.js"></script>

    <!-- 테마 관리 모달 -->
    <dialog id="theme-modal" class="theme-modal-overlay">
        <div class="theme-modal-content">
            <div class="theme-modal-header">
                <span><i class="fa-solid fa-palette"></i> 테마 관리</span>
                <button type="button" class="btn-cancel" onclick="window.closeThemeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="theme-modal-body">
                <!-- 좌: 테마 목록 -->
                <div class="theme-list">
                    <div class="theme-list-title">저장된 테마</div>
                    <div id="theme-list-items"></div>
                    <div class="theme-list-actions">
                        <button type="button" class="theme-action-btn" onclick="document.getElementById('import-theme-input').click()">
                            <i class="fa-solid fa-folder-open"></i> 불러오기
                        </button>
                        <button type="button" class="theme-action-btn" onclick="window.exportTheme()">
                            <i class="fa-solid fa-download"></i> 내보내기
                        </button>
                        <input type="file" id="import-theme-input" accept=".slidetheme" style="display:none;" onchange="window.importTheme(event)">
                    </div>
                </div>
                <!-- 우: 테마 편집기 -->
                <div class="theme-editor">
                    <div class="theme-editor-section">
                        <label class="theme-section-label">테마 이름</label>
                        <input type="text" id="theme-name-input" class="theme-text-input" placeholder="예: my_company_theme">
                    </div>
                    <div class="theme-editor-section">
                        <label class="theme-section-label">모드 설정</label>
                        <label style="color:var(--text-main); display:flex; align-items:center; gap:8px; font-size:13px;">
                            <input type="checkbox" id="theme-is-dark" onchange="window.applyColorPreview()">
                            다크 모드 기본 렌더링 (체크 해제 시 라이트 모드)
                        </label>
                    </div>
                    <div class="theme-editor-section">
                        <label class="theme-section-label">색상 설정</label>
                        <div id="theme-color-editor"></div>
                    </div>
                    <div class="theme-modal-footer">
                        <button type="button" class="theme-btn-apply" onclick="window.applyThemeFromModal()">
                            <i class="fa-solid fa-check"></i> 적용
                        </button>
                        <button type="button" class="theme-btn-save" onclick="window.saveThemeFromModal()">
                            <i class="fa-solid fa-floppy-disk"></i> 서버에 저장
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </dialog>

    <!-- 브랜딩 설정 모달 -->
    <dialog id="branding-modal" class="theme-modal-overlay">
        <div class="theme-modal-content" style="width:480px;">
            <div class="theme-modal-header">
                <span><i class="fa-solid fa-tag"></i> 브랜딩 설정</span>
                <button type="button" class="btn-cancel" onclick="window.closeBrandingModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div style="padding: 24px; display: flex; flex-direction: column; gap: 18px;">
                <p style="font-size:13px; color: var(--text-dim); line-height:1.6; margin:0;">
                    브랜딩 정보는 <strong style="color:var(--text-main);">데이터 파일</strong>에 저장되며,
                    웹 가이드 헤더·footer 및 PPTX 표지·footer에 반영됩니다.
                </p>
                <div class="branding-field">
                    <label class="branding-field-label">프로젝트명 <span>(헤더 제목 / PPTX 표지)</span></label>
                    <input type="text" id="branding-project-name" class="theme-text-input" maxlength="120" autocomplete="organization"
                        placeholder="HPE Virtual Machine Essentials (VME)">
                </div>
                <div class="branding-field">
                    <label class="branding-field-label">부제 <span>(헤더 부제 / PPTX 표지)</span></label>
                    <input type="text" id="branding-guide-subtitle" class="theme-text-input" maxlength="160" autocomplete="off"
                        placeholder="설치 및 구성 가이드">
                </div>
                <div class="branding-field">
                    <label class="branding-field-label">Footer 문구 <span>(페이지 하단 · PPTX 슬라이드 하단)</span></label>
                    <input type="text" id="branding-footer-copy" class="theme-text-input" maxlength="80" autocomplete="off"
                        placeholder="My Guide">
                </div>
                <div style="display:flex; gap:10px; padding-top:6px; border-top:1px solid var(--border-color);">
                    <button type="button" class="theme-btn-save" onclick="window.applyBrandingFromModal()" style="flex:1;">
                        <i class="fa-solid fa-check"></i> 적용 및 저장
                    </button>
                    <button type="button" class="theme-action-btn" onclick="window.closeBrandingModal()" style="min-width:0;">
                        취소
                    </button>
                </div>
            </div>
        </div>
    </dialog>

    <dialog id="project-modal" class="theme-modal-overlay">
        <div class="theme-modal-content project-modal-content">
            <div class="theme-modal-header">
                <span><i class="fa-solid fa-folder-tree"></i> Project Manager</span>
                <button type="button" class="btn-cancel" onclick="window.closeProjectModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="theme-modal-body">
                <div class="theme-list project-list-panel">
                    <div class="theme-list-title">Saved Projects</div>
                    <div id="project-list-items"></div>
                    <div class="theme-list-actions">
                        <button type="button" class="theme-action-btn" onclick="window.refreshProjectModalList()">
                            <i class="fa-solid fa-rotate"></i> Refresh
                        </button>
                    </div>
                </div>
                <div class="theme-editor project-editor-panel">
                    <div class="project-current-card">
                        <div class="project-current-label">Current Project</div>
                        <div id="project-modal-current-name" class="project-current-name">-</div>
                        <div id="project-modal-current-meta" class="project-current-meta">No project selected</div>
                    </div>

                    <div class="project-mode-switch" role="tablist" aria-label="Project actions">
                        <button type="button" id="project-mode-open" class="project-mode-btn" onclick="window.setProjectModalMode('open')">
                            <i class="fa-solid fa-folder-open"></i> Open
                        </button>
                        <button type="button" id="project-mode-new" class="project-mode-btn" onclick="window.setProjectModalMode('new')">
                            <i class="fa-solid fa-folder-plus"></i> New
                        </button>
                        <button type="button" id="project-mode-saveas" class="project-mode-btn" onclick="window.setProjectModalMode('saveAs')">
                            <i class="fa-solid fa-copy"></i> Save As
                        </button>
                        <button type="button" id="project-mode-rename" class="project-mode-btn" onclick="window.setProjectModalMode('rename')">
                            <i class="fa-solid fa-pen"></i> Rename
                        </button>
                        <button type="button" id="project-mode-delete" class="project-mode-btn project-mode-btn--danger" onclick="window.setProjectModalMode('delete')">
                            <i class="fa-solid fa-trash"></i> Delete
                        </button>
                    </div>

                    <div class="project-editor-section">
                        <label id="project-modal-name-label" class="theme-section-label" for="project-modal-name-input">Project Name</label>
                        <input type="text" id="project-modal-name-input" class="theme-text-input" placeholder="My Guide" maxlength="120" autocomplete="off" required oninput="window.setProjectModalNameDraft(this.value)">
                        <p id="project-modal-help" class="project-help-text"></p>
                    </div>

                    <div class="project-editor-section">
                        <div class="theme-section-label">Selected Project</div>
                        <div id="project-modal-selection" class="project-selection-card">
                            Select a project from the list.
                        </div>
                    </div>

                    <div class="theme-modal-footer">
                        <button type="button" id="project-modal-primary-btn" class="theme-btn-apply" onclick="window.submitProjectModalAction()">
                            <i class="fa-solid fa-check"></i> Continue
                        </button>
                        <button type="button" class="theme-action-btn" onclick="window.closeProjectModal()">
                            Cancel
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </dialog>

    <template id="phase9-toc-chapter-template">
        <div class="toc-nav-chapter"></div>
    </template>
    <template id="phase9-toc-middle-template">
        <div class="toc-nav-middle" tabindex="0"></div>
    </template>
    <template id="phase9-toc-title-template">
        <div class="toc-nav-title" tabindex="0"></div>
    </template>
</body>
</html>
