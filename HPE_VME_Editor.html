<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPE VME 가이드 제작 도구 - Professional Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_three@1.5/D2Coding.css">
    
    <!-- PPTX 생성 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js" crossorigin="anonymous"></script>
    
    <!-- Markdown 파서 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Syntax Highlighting 라이브러리 (highlight.js) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>

    <link rel="stylesheet" href="src/style.css">
</head>
<body>

    <!-- 커스텀 모달 UI -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <p id="modal-message">메시지</p>
            <div class="modal-buttons">
                <button type="button" id="modal-btn-confirm" class="btn-danger">확인</button>
                <button type="button" id="modal-btn-cancel" class="btn-secondary">취소</button>
            </div>
        </div>
    </div>

    <!-- 이미지 확대 모달 UI -->
    <div id="image-modal" class="img-modal-overlay" onclick="window.closeImageModal()">
        <img id="image-modal-content" class="img-modal-content" src="">
    </div>

    <!-- 맨 위로 가기 플로팅 버튼 -->
    <button type="button" class="btn-top" id="btn-top-editor" onclick="window.scrollToTop()">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <nav class="header-nav">
        <div class="logo">HPE VME <span>Guide Creator</span></div>
        <div style="display: flex; gap: 10px;">
            <button type="button" class="btn-secondary-download" style="border-color: var(--text-dim); color: var(--text-dim); background: transparent;" onclick="document.body.classList.toggle('light-mode')">
                <i class="fa-solid fa-circle-half-stroke"></i> 테마 전환
            </button>
            <input type="file" id="import-data-input" accept=".json" style="display: none;" onchange="window.importData(event)">
            <button type="button" class="btn-secondary-download" style="border-color: #a855f7; color: #a855f7; background: rgba(168, 85, 247, 0.1);" onclick="document.getElementById('import-data-input').click()">
                <i class="fa-solid fa-folder-open"></i> 불러오기
            </button>
            <button type="button" class="btn-secondary-download" style="border-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1);" onclick="window.downloadData()">
                <i class="fa-solid fa-download"></i> 다운로드
            </button>
            <button type="button" class="btn-save-progress" id="dl-save-btn" onclick="window.exportData()">
                <i class="fa-solid fa-floppy-disk"></i> 서버 덮어쓰기
            </button>
            <button type="button" class="btn-secondary-download" id="dl-html-view-btn" onclick="window.viewWebGuide()">
                <i class="fa-solid fa-book-open"></i> 가이드 보기
            </button>
            <button type="button" class="btn-secondary-download" id="dl-html-btn" onclick="window.exportToHTML()">
                <i class="fa-solid fa-download"></i> 가이드 다운
            </button>
            <button type="button" class="btn-download" id="dl-btn" onclick="window.exportToPPTX()">
                <i class="fa-solid fa-file-export"></i> PPTX 다운로드
            </button>
        </div>
    </nav>

    <div class="layout-wrapper">
        <!-- 동적 목차 사이드바 -->
        <aside class="toc-sidebar" id="toc-navigator">
            <!-- 자바스크립트로 목차가 렌더링 됩니다 -->
        </aside>

        <div class="main-container">
            
            <div class="status-bar" id="status-text">시작하려면 아래 폼을 작성하고 생성 버튼을 눌러주세요.</div>
            
            <!-- 프리뷰 렌더링 영역 -->
            <div id="preview-area" style="display: flex; flex-direction: column; gap: 30px;">
            </div>

        </div>
    </div>

    <script src="src/app.js"></script>

</body>
</html>
